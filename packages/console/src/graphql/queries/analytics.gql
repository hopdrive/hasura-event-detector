query AnalyticsPerformance($timeRange: timestamptz!, $timeRangeEnd: timestamptz!) {
  dashboard_stats(
    where: { hour_bucket: { _gte: $timeRange, _lte: $timeRangeEnd } }
    order_by: { hour_bucket: asc }
  ) {
    hour_bucket
    source_function
    avg_duration_ms
    p95_duration_ms
    max_duration_ms
    total_invocations
    successful_invocations
    failed_invocations
  }

  all_invocations: invocations(
    where: {
      created_at: { _gte: $timeRange, _lte: $timeRangeEnd }
      status: { _eq: "completed" }
    }
  ) {
    source_function
    total_duration_ms
  }

  slowest_jobs: job_executions(
    where: {
      created_at: { _gte: $timeRange, _lte: $timeRangeEnd }
      status: { _neq: "failed" }
    }
    order_by: { duration_ms: desc }
    limit: 10
  ) {
    id
    job_name
    job_function_name
    duration_ms
    created_at
    event_execution {
      event_name
    }
  }

  invocations_durations: invocations(
    where: {
      created_at: { _gte: $timeRange, _lte: $timeRangeEnd }
      status: { _eq: "completed" }
    }
  ) {
    total_duration_ms
  }

  invocations_aggregate(where: { created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }) {
    aggregate {
      count
      avg {
        total_duration_ms
      }
      max {
        total_duration_ms
      }
    }
  }
}

query AnalyticsJobsEvents($timeRange: timestamptz!, $timeRangeEnd: timestamptz!) {
  all_jobs: job_executions(
    where: { created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }
  ) {
    job_name
    status
    duration_ms
    created_at
  }

  all_events: event_executions(
    where: { created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }
  ) {
    event_name
    detected
    detection_duration_ms
    handler_duration_ms
    jobs_count
    jobs_succeeded
    jobs_failed
    created_at
    status
  }

  recent_failures: job_executions(
    where: {
      created_at: { _gte: $timeRange, _lte: $timeRangeEnd }
      status: { _eq: "failed" }
    }
    order_by: { created_at: desc }
    limit: 20
  ) {
    id
    invocation_id
    job_name
    error_message
    duration_ms
    created_at
    correlation_id
    invocation {
      source_function
    }
    event_execution {
      event_name
    }
  }

  job_executions_aggregate(where: { created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }) {
    aggregate {
      count
      avg {
        duration_ms
      }
    }
  }

  event_executions_aggregate(where: { created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }) {
    aggregate {
      count
    }
  }
}

query JobExecutionSamples($jobName: String!, $timeRange: timestamptz!, $timeRangeEnd: timestamptz!) {
  failed: job_executions(
    where: {
      job_name: { _eq: $jobName }
      status: { _eq: "failed" }
      created_at: { _gte: $timeRange, _lte: $timeRangeEnd }
    }
    order_by: { created_at: desc }
    limit: 5
  ) {
    id
    invocation_id
    job_name
    status
    duration_ms
    error_message
    created_at
    invocation {
      source_function
    }
    event_execution {
      event_name
    }
  }

  succeeded: job_executions(
    where: {
      job_name: { _eq: $jobName }
      status: { _eq: "completed" }
      created_at: { _gte: $timeRange, _lte: $timeRangeEnd }
    }
    order_by: { created_at: desc }
    limit: 5
  ) {
    id
    invocation_id
    job_name
    status
    duration_ms
    created_at
    invocation {
      source_function
    }
    event_execution {
      event_name
    }
  }
}

query AnalyticsSources($timeRange: timestamptz!, $timeRangeEnd: timestamptz!) {
  invocations_by_source: invocations(
    where: { created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }
  ) {
    source_function
    source_table
    source_operation
    source_user_email
    status
    total_duration_ms
    total_jobs_run
    total_jobs_succeeded
    total_jobs_failed
    events_detected_count
    created_at
  }
}
