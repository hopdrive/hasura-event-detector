query OverviewDashboard($timeRange: timestamptz!, $timeRangeEnd: timestamptz!) {
  # Chart data: use pre-aggregated hourly stats instead of fetching every row
  dashboard_stats(
    where: { hour_bucket: { _gte: $timeRange, _lte: $timeRangeEnd } }
    order_by: { hour_bucket: asc }
  ) {
    hour_bucket
    total_invocations
    successful_invocations
    failed_invocations
  }

  # Table data: fetch only top 10 invocations with all fields needed for table display
  invocations_table: invocations(
    where: { created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }
    order_by: { created_at: desc }
    limit: 10
  ) {
    id
    source_function
    created_at
    total_duration_ms
    status
    events_detected_count
    total_jobs_run
    total_jobs_succeeded
    total_jobs_failed
    correlation_id
    source_user_email
    source_user_role
  }

  invocations_aggregate(where: { created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }) {
    aggregate {
      count
      avg {
        total_duration_ms
      }
      sum {
        total_jobs_run
        total_jobs_succeeded
        total_jobs_failed
      }
    }
  }

  event_executions_aggregate(where: { detected: { _eq: true }, created_at: { _gte: $timeRange, _lte: $timeRangeEnd } }) {
    aggregate {
      count
    }
    nodes {
      event_name
    }
  }
}

subscription InvocationsRealtime {
  invocations(
    limit: 20
    order_by: { created_at: desc }
    where: { status: { _in: ["running", "completed", "failed"] } }
  ) {
    id
    created_at
    source_function
    status
    total_duration_ms
    events_detected_count
    total_jobs_run
    total_jobs_succeeded
    total_jobs_failed
    correlation_id
  }
}
