name: Deploy Console to Netlify

on:
  push:
    branches:
      - master
      - logger-upgrade
    paths:
      - 'packages/console/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/console

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: packages/console/package-lock.json

      - run: npm install

      - run: npm run build
        env:
          VITE_AUTH_ENABLED: 'true'

      # All env vars (VITE_* and server-side secrets) are configured
      # in the Netlify dashboard under Site > Environment variables
      - run: npx netlify-cli deploy --prod --dir=dist --functions=netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
